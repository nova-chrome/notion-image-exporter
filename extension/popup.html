<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notion Image Exporter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div class="brand">
          <img
            class="brand-logo"
            src="assets/nie-logo-simple-transparent.png"
            alt=""
            width="44"
            height="44"
          />
          <div>
            <p class="eyebrow">Notion Image Exporter</p>
            <h1>Download page images</h1>
          </div>
        </div>
      </header>

      <section id="status" class="status" hidden></section>

      <section id="settings" class="panel" hidden>
        <label class="field">
          <span>Pairing code</span>
          <input id="pairing-code" type="password" placeholder="Paste code from the app" />
        </label>
        <div class="row">
          <button id="open-pairing" class="button secondary" type="button">Open pairing page</button>
          <button id="pair" class="button" type="button">Pair</button>
        </div>
      </section>

      <section id="exporter" class="panel">
        <label class="field">
          <span>Integration</span>
          <select id="integration"></select>
        </label>
        <label class="field">
          <span>Page URL or ID</span>
          <input id="page-url" type="text" placeholder="https://www.notion.so/..." />
        </label>
        <button id="export" class="button full" type="button">Download ZIP</button>
      </section>

      <footer id="footer" class="footer">
        <button id="refresh" class="link-button" type="button">Refresh integrations</button>
        <button id="disconnect" class="link-button danger" type="button">Disconnect</button>
      </footer>
    </main>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
